services:
  db:
    image: postgres:17-alpine
    restart: always
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tower}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=${POSTGRES_DB:-tower}
    networks:
      - agent-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tower}"]
      interval: 5s
      timeout: 3s
      retries: 5

  lb:
    image: nginx:alpine
    restart: always
    depends_on:
      tower:
        condition: service_healthy
    ports:
      - "${TOWER_PORT:-8420}:80"
    volumes:
      - ./lb/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - agent-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  tower:
    build: ./tower
    restart: always
    depends_on:
      db:
        condition: service_healthy
    deploy:
      replicas: ${TOWER_REPLICAS:-1}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8420/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    stop_grace_period: 30s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./profiles:/app/profiles:ro
      - ./templates:/app/templates:ro
      - ./hooks:/app/hooks:ro
    environment:
      - WORKER_IMAGE=${WORKER_IMAGE:-agent-worker-worker}
      - PROFILES_DIR=/app/profiles
      - TEMPLATES_DIR=/app/templates
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-10}
      - JOB_TTL_HOURS=${JOB_TTL_HOURS:-24}
      - MAX_RETAINED_JOBS=${MAX_RETAINED_JOBS:-1000}
      - WORKER_TIMEOUT_SECONDS=${WORKER_TIMEOUT_SECONDS:-3600}
      - WORKER_MEM_LIMIT=${WORKER_MEM_LIMIT:-512m}
      - WORKER_CPU_LIMIT=${WORKER_CPU_LIMIT:-2.0}
      - HOOKS_DIR=/app/hooks
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tower}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-tower}
      - TOWER_API_KEY=${TOWER_API_KEY:-}
      - WORKER_HARDENED=${WORKER_HARDENED:-false}
      - PROXY_URL=${PROXY_URL:-}
      - POOL_SIZE=${POOL_SIZE:-3}
      - POOL_CHECK_INTERVAL=${POOL_CHECK_INTERVAL:-10}
      - POOL_MAX_IDLE=${POOL_MAX_IDLE:-3600}
    networks:
      - agent-net

  worker:
    build: ./worker
    profiles: ["build-only"]

volumes:
  pg-data:

networks:
  agent-net:
