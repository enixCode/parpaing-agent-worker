services:
  db:
    image: postgres:17-alpine
    restart: always
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tower}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=${POSTGRES_DB:-tower}
    networks:
      - agent-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tower}"]
      interval: 5s
      timeout: 3s
      retries: 5

  lb:
    image: nginx:alpine
    restart: always
    depends_on:
      tower:
        condition: service_healthy
    ports:
      - "${TOWER_PORT:-8420}:80"
    volumes:
      - ./lb/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - agent-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  tower:
    build: ./tower
    restart: always
    depends_on:
      db:
        condition: service_healthy
    deploy:
      replicas: ${TOWER_REPLICAS:-1}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8420/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    stop_grace_period: 30s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./profiles:/app/profiles:ro
      - ./templates:/app/templates:ro
      - ./hooks:/app/hooks:ro
      - ./engines:/app/engines:ro
      - ./ui:/app/ui:ro
    env_file: .env
    environment:
      # Container paths (override .env defaults for Docker context)
      - PROFILES_DIR=/app/profiles
      - TEMPLATES_DIR=/app/templates
      - HOOKS_DIR=/app/hooks
      - ENGINES_DIR=/app/engines
      - UI_PATH=/app/ui/index.html
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tower}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-tower}
    networks:
      - agent-net

  worker:
    build: ./worker
    profiles: ["build-only"]

volumes:
  pg-data:

networks:
  agent-net:
