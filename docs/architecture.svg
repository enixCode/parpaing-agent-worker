<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#58a6ff"/>
    </marker>
    <marker id="g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3fb950"/>
    </marker>
    <marker id="m" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="580" rx="8" fill="#0d1117"/>

  <!-- Client -->
  <rect x="195" y="20" width="160" height="36" rx="18" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
  <text x="275" y="43" text-anchor="middle" fill="#e6edf3" font-weight="500">Client</text>

  <!-- Arrow: Client → Tower -->
  <line x1="275" y1="56" x2="275" y2="118" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="285" y="92" fill="#8b949e" font-size="10">POST /jobs</text>

  <!-- Tower -->
  <rect x="155" y="122" width="240" height="70" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="275" y="148" text-anchor="middle" fill="#58a6ff" font-weight="600" font-size="14">Tower × N</text>
  <text x="275" y="166" text-anchor="middle" fill="#8b949e" font-size="11">FastAPI :8420</text>
  <text x="275" y="184" text-anchor="middle" fill="#8b949e" font-size="10">create job · dispatch · wait · extract</text>

  <!-- PostgreSQL -->
  <rect x="530" y="122" width="200" height="70" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="630" y="148" text-anchor="middle" fill="#3fb950" font-weight="600">PostgreSQL</text>
  <text x="630" y="166" text-anchor="middle" fill="#8b949e" font-size="11">jobs · containers · pool</text>
  <text x="630" y="184" text-anchor="middle" fill="#8b949e" font-size="10">shared across all Towers</text>

  <!-- Arrows: Tower ↔ PostgreSQL -->
  <line x1="395" y1="149" x2="528" y2="149" stroke="#3fb950" stroke-width="1.5" marker-end="url(#g)"/>
  <line x1="528" y1="166" x2="395" y2="166" stroke="#3fb950" stroke-width="1" stroke-dasharray="4" marker-end="url(#g)"/>

  <!-- Arrow: Tower → Pool -->
  <line x1="275" y1="192" x2="275" y2="230" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="285" y="216" fill="#8b949e" font-size="10">acquire</text>

  <!-- Container Pool -->
  <rect x="155" y="234" width="240" height="48" rx="6" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="275" y="255" text-anchor="middle" fill="#bc8cff" font-weight="600">Container Pool</text>
  <text x="275" y="272" text-anchor="middle" fill="#8b949e" font-size="10">warm workers · atomic SQL lock</text>

  <!-- Arrow: Pool → Worker -->
  <line x1="275" y1="282" x2="275" y2="328" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="285" y="310" fill="#8b949e" font-size="10">put_archive</text>

  <!-- Worker -->
  <rect x="155" y="332" width="240" height="90" rx="6" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="275" y="356" text-anchor="middle" fill="#f85149" font-weight="600" font-size="14">Worker</text>
  <text x="275" y="374" text-anchor="middle" fill="#e6edf3" font-size="11">isolated Docker container</text>
  <text x="275" y="392" text-anchor="middle" fill="#8b949e" font-size="10">hooks → parse → engine CLI → result</text>
  <text x="275" y="408" text-anchor="middle" fill="#8b949e" font-size="10">destroyed after each job</text>

  <!-- Arrow: Worker → Result -->
  <line x1="275" y1="422" x2="275" y2="456" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="285" y="444" fill="#8b949e" font-size="10">get_archive</text>

  <!-- Result -->
  <rect x="195" y="460" width="160" height="36" rx="6" fill="#1c2333" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="275" y="483" text-anchor="middle" fill="#58a6ff" font-weight="500">result.json</text>

  <!-- Return path (right side) -->
  <path d="M355,478 Q480,478 480,366 L480,38 Q480,28 460,28 L357,28" fill="none" stroke="#8b949e" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#m)"/>
  <text x="490" y="170" fill="#8b949e" font-size="10">GET /jobs/{id}</text>
  <text x="490" y="183" fill="#8b949e" font-size="10">GET /jobs/{id}/wait</text>

  <!-- Legend -->
  <rect x="530" y="270" width="200" height="100" rx="4" fill="#161b22" stroke="#30363d"/>
  <text x="545" y="290" fill="#8b949e" font-size="11" font-weight="600">Legend</text>
  <rect x="545" y="300" width="10" height="10" rx="2" fill="#58a6ff"/>
  <text x="562" y="310" fill="#e6edf3" font-size="10">Orchestrator</text>
  <rect x="545" y="318" width="10" height="10" rx="2" fill="#3fb950"/>
  <text x="562" y="328" fill="#e6edf3" font-size="10">Database (shared)</text>
  <rect x="545" y="336" width="10" height="10" rx="2" fill="#bc8cff"/>
  <text x="562" y="346" fill="#e6edf3" font-size="10">Pool (DB-backed)</text>
  <rect x="545" y="354" width="10" height="10" rx="2" fill="#f85149"/>
  <text x="562" y="364" fill="#e6edf3" font-size="10">Worker (ephemeral)</text>
</svg>
