<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 720" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#58a6ff"/>
    </marker>
    <marker id="g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3fb950"/>
    </marker>
    <marker id="m" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8b949e"/>
    </marker>
    <marker id="o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d29922"/>
    </marker>
    <marker id="l" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#79c0ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="720" rx="8" fill="#0d1117"/>

  <!-- Client -->
  <rect x="195" y="20" width="160" height="36" rx="18" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
  <text x="275" y="43" text-anchor="middle" fill="#e6edf3" font-weight="500">Client</text>

  <!-- Arrow: Client - LB -->
  <line x1="275" y1="56" x2="275" y2="88" stroke="#79c0ff" stroke-width="1.5" marker-end="url(#l)"/>
  <text x="285" y="78" fill="#8b949e" font-size="10">POST /jobs</text>

  <!-- LB -->
  <rect x="175" y="92" width="200" height="48" rx="6" fill="#161b22" stroke="#79c0ff" stroke-width="2"/>
  <text x="275" y="114" text-anchor="middle" fill="#79c0ff" font-weight="600" font-size="14">LB</text>
  <text x="275" y="132" text-anchor="middle" fill="#8b949e" font-size="10">nginx :TOWER_PORT - round-robin</text>

  <!-- Arrow: LB - Tower -->
  <line x1="275" y1="140" x2="275" y2="172" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Tower -->
  <rect x="155" y="176" width="240" height="70" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="275" y="202" text-anchor="middle" fill="#58a6ff" font-weight="600" font-size="14">Tower x N</text>
  <text x="275" y="220" text-anchor="middle" fill="#8b949e" font-size="11">FastAPI :8420</text>
  <text x="275" y="238" text-anchor="middle" fill="#8b949e" font-size="10">create job - dispatch - wait - extract</text>

  <!-- PostgreSQL -->
  <rect x="530" y="176" width="210" height="70" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="635" y="202" text-anchor="middle" fill="#3fb950" font-weight="600">PostgreSQL</text>
  <text x="635" y="220" text-anchor="middle" fill="#8b949e" font-size="11">jobs - containers - configs</text>
  <text x="635" y="238" text-anchor="middle" fill="#8b949e" font-size="10">shared across all Towers</text>

  <!-- Arrows: Tower <-> PostgreSQL -->
  <line x1="395" y1="203" x2="528" y2="203" stroke="#3fb950" stroke-width="1.5" marker-end="url(#g)"/>
  <line x1="528" y1="220" x2="395" y2="220" stroke="#3fb950" stroke-width="1" stroke-dasharray="4" marker-end="url(#g)"/>

  <!-- Network label: agent-net -->
  <rect x="530" y="264" width="210" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-dasharray="4"/>
  <text x="635" y="281" text-anchor="middle" fill="#8b949e" font-size="10">agent-net (LB + Tower + DB + Gateway)</text>

  <!-- Arrow: Tower - Pool -->
  <line x1="275" y1="246" x2="275" y2="312" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="285" y="284" fill="#8b949e" font-size="10">acquire</text>

  <!-- Container Pool -->
  <rect x="155" y="316" width="240" height="48" rx="6" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="275" y="337" text-anchor="middle" fill="#bc8cff" font-weight="600">Container Pool</text>
  <text x="275" y="354" text-anchor="middle" fill="#8b949e" font-size="10">warm workers - atomic SQL lock - DB-backed</text>

  <!-- Arrow: Pool - Worker -->
  <line x1="275" y1="364" x2="275" y2="410" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="285" y="392" fill="#8b949e" font-size="10">put_archive</text>

  <!-- Worker -->
  <rect x="155" y="414" width="240" height="90" rx="6" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="275" y="438" text-anchor="middle" fill="#f85149" font-weight="600" font-size="14">Worker</text>
  <text x="275" y="456" text-anchor="middle" fill="#e6edf3" font-size="11">isolated Docker container</text>
  <text x="275" y="474" text-anchor="middle" fill="#8b949e" font-size="10">hooks - parse - engine CLI - result</text>
  <text x="275" y="490" text-anchor="middle" fill="#8b949e" font-size="10">destroyed after each job</text>

  <!-- LLM Gateway -->
  <rect x="530" y="424" width="210" height="70" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="635" y="450" text-anchor="middle" fill="#d29922" font-weight="600">LLM Gateway</text>
  <text x="635" y="468" text-anchor="middle" fill="#8b949e" font-size="11">nginx :4000</text>
  <text x="635" y="486" text-anchor="middle" fill="#8b949e" font-size="10">hides API keys from workers</text>

  <!-- Arrow: Worker - Gateway -->
  <line x1="395" y1="454" x2="528" y2="454" stroke="#d29922" stroke-width="1.5" marker-end="url(#o)"/>
  <text x="462" y="447" fill="#8b949e" font-size="10" text-anchor="middle">placeholder keys</text>

  <!-- Arrow: Gateway - LLM APIs -->
  <line x1="635" y1="494" x2="635" y2="532" stroke="#d29922" stroke-width="1.5" marker-end="url(#o)"/>

  <!-- LLM APIs -->
  <rect x="545" y="536" width="180" height="36" rx="18" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
  <text x="635" y="559" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="11">Anthropic / OpenAI APIs</text>

  <!-- Network label: agent-workers -->
  <rect x="530" y="344" width="210" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-dasharray="4"/>
  <text x="635" y="361" text-anchor="middle" fill="#8b949e" font-size="10">agent-workers (internal, no internet)</text>

  <!-- Arrow: Worker - Result -->
  <line x1="275" y1="504" x2="275" y2="542" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="285" y="528" fill="#8b949e" font-size="10">get_archive</text>

  <!-- Result -->
  <rect x="195" y="546" width="160" height="36" rx="6" fill="#1c2333" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="275" y="569" text-anchor="middle" fill="#58a6ff" font-weight="500">result.json</text>

  <!-- Return path (right side) -->
  <path d="M355,564 Q760,564 760,300 L760,38 Q760,28 740,28 L357,28" fill="none" stroke="#8b949e" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#m)"/>
  <text x="766" y="250" fill="#8b949e" font-size="10" transform="rotate(90,766,250)">GET /jobs/{id} or /wait</text>

  <!-- Legend -->
  <rect x="30" y="600" width="720" height="100" rx="4" fill="#161b22" stroke="#30363d"/>
  <text x="50" y="622" fill="#8b949e" font-size="11" font-weight="600">Legend</text>
  <rect x="50" y="632" width="10" height="10" rx="2" fill="#79c0ff"/>
  <text x="67" y="642" fill="#e6edf3" font-size="10">Load Balancer (nginx)</text>
  <rect x="210" y="632" width="10" height="10" rx="2" fill="#58a6ff"/>
  <text x="227" y="642" fill="#e6edf3" font-size="10">Orchestrator (Tower)</text>
  <rect x="380" y="632" width="10" height="10" rx="2" fill="#3fb950"/>
  <text x="397" y="642" fill="#e6edf3" font-size="10">Database (shared)</text>
  <rect x="530" y="632" width="10" height="10" rx="2" fill="#bc8cff"/>
  <text x="547" y="642" fill="#e6edf3" font-size="10">Pool (DB-backed)</text>
  <rect x="50" y="656" width="10" height="10" rx="2" fill="#f85149"/>
  <text x="67" y="666" fill="#e6edf3" font-size="10">Worker (ephemeral)</text>
  <rect x="210" y="656" width="10" height="10" rx="2" fill="#d29922"/>
  <text x="227" y="666" fill="#e6edf3" font-size="10">Gateway (nginx)</text>
  <text x="50" y="690" fill="#8b949e" font-size="10">Solid lines: data flow - Dashed lines: return path - Workers never see real API keys</text>
</svg>
