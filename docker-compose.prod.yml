# Production - pre-built images from GHCR, no bind-mounts
# Usage: docker compose -f docker-compose.prod.yml up -d
services:
  db:
    image: postgres:17-alpine
    restart: always
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tower}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=${POSTGRES_DB:-tower}
    networks:
      - agent-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tower}"]
      interval: 5s
      timeout: 3s
      retries: 5

  tower:
    image: ghcr.io/enixcode/parpaing-agent-worker/tower:main
    restart: always
    depends_on:
      db:
        condition: service_healthy
    deploy:
      replicas: ${TOWER_REPLICAS:-1}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8420/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    stop_grace_period: 30s
    ports:
      - "${TOWER_PORT:-8420}:8420"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file: .env
    environment:
      - PROFILES_DIR=/app/profiles
      - TEMPLATES_DIR=/app/templates
      - HOOKS_DIR=/app/hooks
      - ENGINES_DIR=/app/engines
      - UI_PATH=/app/ui/index.html
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tower}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-tower}
    networks:
      - agent-net

  gateway:
    image: nginx:alpine
    container_name: ${GATEWAY_CONTAINER:-agent-gateway}
    restart: always
    volumes:
      - ./gateway/gateway.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - agent-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pg-data:

networks:
  agent-net:
